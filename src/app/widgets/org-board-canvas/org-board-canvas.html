<f-flow
  fDraggable
  class="w-full h-full"
  (fDragStarted)="onDragStarted()"
  (fDragEnded)="onDragEnded()"
  (fCreateConnection)="onConnectionCreated($event)"
  (fReassignConnection)="onConnectionReassigned($event)"
  (fCreateNode)="onExternalDrop($event)"
>
  <f-canvas>
    <f-connection-for-create [fType]="connectionMode()">
      <svg fMarker [width]="12" [height]="8" [refX]="12" [refY]="4"
           type="f-connection-marker-end" orient="auto" markerUnits="userSpaceOnUse">
        <polyline points="0,0 12,4 0,8" fill="none"
                  stroke="#6366f1" stroke-width="1.5"
                  stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </f-connection-for-create>

    @for (node of nodes(); track node.userId) {
      <div
        fNode
        fDragHandle
        [fNodePosition]="{ x: node.x, y: node.y }"
        (fNodePositionChange)="onPositionChange(node, $event)"
        class="relative"
      >
        <!-- Input: full card area for easy connection drop, line attaches at top -->
        <div
          fNodeInput
          [fInputId]="'in-' + node.userId"
          fInputConnectableSide="top"
          class="absolute inset-0 pointer-events-none"
        ></div>

        <app-user-board-card
          [user]="node.user"
          [selected]="selectedUserId() === node.userId"
          [directReportsCount]="0"
          (click)="onNodeClick(node.userId)"
        />

        <!-- Output: drag from this node to create a manager→subordinate connection -->
        <div
          fNodeOutput
          [fOutputId]="'out-' + node.userId"
          [fOutputMultiple]="true"
          [fCanBeConnectedInputs]="validTargetsByUser().get(node.userId) ?? []"
          fOutputConnectableSide="bottom"
          class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2
                 w-3 h-3 rounded-full bg-primary cursor-crosshair
                 hover:scale-150 transition-transform z-10"
        ></div>

        <!-- Visual indicator: flat shelf at top, shown only when node has incoming connection -->
        @if (hasIncomingEdge().has(node.userId)) {
          <div
            class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2
                   w-8 h-0.5 rounded-full bg-secondary
                   pointer-events-none z-10"
          ></div>
        }
      </div>
    }

    @for (edge of edges(); track edge.id) {
      <f-connection [fOutputId]="edge.outputId" [fInputId]="edge.inputId" [fType]="connectionMode()">
        <svg fMarker [width]="12" [height]="8" [refX]="12" [refY]="4"
             type="f-connection-marker-end" orient="auto" markerUnits="userSpaceOnUse">
          <polyline points="0,0 12,4 0,8" fill="none"
                    stroke="#6366f1" stroke-width="1.5"
                    stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </f-connection>
    }
  </f-canvas>
</f-flow>

<!-- Connection mode toggle -->
<div class="absolute top-3 right-3 z-20">
  <button
    class="btn btn-sm btn-ghost bg-base-200/80 backdrop-blur-sm gap-1"
    (click)="toggleConnectionMode()"
    [title]="connectionMode() === 'org-board-curve' ? 'Switch to bezier curves' : 'Switch to step lines'"
  >
    @if (connectionMode() === 'org-board-curve') {
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4 L4 12 L20 12 L20 20"/>
      </svg>
      Step
    } @else {
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4 C4 14 20 10 20 20"/>
      </svg>
      Bezier
    }
  </button>
</div>
