<div class="min-h-screen bg-base-200 flex items-center justify-center p-8">
  <div class="card bg-base-100 shadow-xl w-full max-w-lg">
    <form [formRoot]="userForm()" class="card-body gap-4">
      <div class="flex items-center justify-between">
        <h2 class="card-title text-2xl">{{ title() }}</h2>
        <a routerLink="/users" class="btn btn-ghost btn-sm">← Back</a>
      </div>

      <app-username-field [field]="userForm().username" />
      <app-name-group [field]="userForm().name" />
      <app-email-field [field]="userForm().email" />
      <app-age-field [field]="userForm().age" />
      <app-country-select [field]="userForm().country" />
      <app-department-select [field]="userForm().department" />
      <app-job-title-select [field]="userForm().jobTitle" />
      <app-role-field [field]="userForm().role" />
      <app-active-field [field]="userForm().active" />
      <app-bio-field [field]="userForm().bio" />

      <div class="card-actions mt-2 gap-2">
        <app-submit-button [pending]="userForm()().submitting()">{{ submitLabel() }}</app-submit-button>
        <a routerLink="/users" class="btn btn-ghost w-full">Cancel</a>
      </div>

      <div class="collapse collapse-arrow bg-base-200">
        <input type="checkbox" />
        <div class="collapse-title text-sm font-medium">Debug: model state</div>
        <div class="collapse-content">
          <pre class="text-xs overflow-auto">{{ model()() | json }}</pre>
        </div>
      </div>
    </form>
  </div>
</div>
