<div class="min-h-screen bg-base-200 flex items-center justify-center p-8">
  <div class="card bg-base-100 shadow-xl w-full max-w-md">
    <form [formRoot]="departmentForm()" class="card-body gap-4">
      <div class="flex items-center justify-between">
        <h2 class="card-title text-2xl">{{ title() }}</h2>
        <a [routerLink]="cancelLink()" class="btn btn-ghost btn-sm">← Back</a>
      </div>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Name</legend>
        <input
          [formField]="departmentForm().name"
          type="text"
          class="input input-bordered w-full"
          placeholder="e.g. Engineering"
        />
        <app-field-errors
          [field]="departmentForm().name"
          [messages]="{ required: 'Name is required', minLength: 'At least 2 characters' }"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Group</legend>
        <input
          [formField]="departmentForm().group"
          type="text"
          class="input input-bordered w-full"
          placeholder="e.g. Technology"
        />
        <app-field-errors
          [field]="departmentForm().group"
          [messages]="{ required: 'Group is required' }"
        />
      </fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Icon</legend>
        <app-department-icon-picker [formField]="departmentForm().icon" />
      </fieldset>

      <div class="card-actions mt-2 gap-2">
        <button type="submit" [disabled]="departmentForm()().submitting()" class="btn btn-primary w-full">{{ submitLabel() }}</button>
        <a [routerLink]="cancelLink()" class="btn btn-ghost w-full">Cancel</a>
      </div>
    </form>
  </div>
</div>
